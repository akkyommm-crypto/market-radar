<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0e17">
<title>AI市場レーダー</title>
<style>
:root{
  --bg:#0a0e17; --panel:#111725; --panel2:#161d2e; --line:#232c40;
  --ink:#e8ecf4; --dim:#7a869e; --faint:#4a5570;
  --green:#3ddc84; --amber:#ffc94d; --red:#ff5d6c;
  --cyan:#4fd3ff; --gold:#ffd24a; --up:#ff5d6c; --down:#4fd3ff;
  --radar:#4fd3ff;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
  padding:env(safe-area-inset-top) 0 calc(72px + env(safe-area-inset-bottom));
  line-height:1.5; font-feature-settings:"palt";
}
/* 数字は等幅で桁を揃える */
.mono{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}

/* ---- ヘッダー ---- */
header{
  position:sticky; top:0; z-index:20; background:rgba(10,14,23,.92);
  backdrop-filter:blur(12px); border-bottom:1px solid var(--line);
  padding:14px 18px 12px;
}
.brand{display:flex;align-items:center;gap:9px}
.brand .dot{width:9px;height:9px;border-radius:50%;background:var(--radar);
  box-shadow:0 0 0 0 var(--radar);animation:ping 2.4s ease-out infinite}
@keyframes ping{0%{box-shadow:0 0 0 0 rgba(79,211,255,.5)}70%,100%{box-shadow:0 0 0 10px rgba(79,211,255,0)}}
.brand h1{font-size:16px;font-weight:800;letter-spacing:.02em}
.brand .ver{font-size:10px;color:var(--faint);font-weight:600;margin-left:auto;letter-spacing:.08em}
.stamp{font-size:11px;color:var(--dim);margin-top:3px}

/* ---- 地合いバナー ---- */
.regime{margin:14px 14px 0;border-radius:16px;padding:16px 16px 14px;position:relative;overflow:hidden;
  border:1px solid var(--line);background:var(--panel)}
.regime::before{content:"";position:absolute;inset:0;opacity:.10;pointer-events:none}
.regime.green::before{background:radial-gradient(120% 100% at 0% 0%,var(--green),transparent 60%)}
.regime.yellow::before{background:radial-gradient(120% 100% at 0% 0%,var(--amber),transparent 60%)}
.regime.red::before{background:radial-gradient(120% 100% at 0% 0%,var(--red),transparent 60%)}
.regime .lbl{font-size:11px;color:var(--dim);letter-spacing:.14em;font-weight:700}
.regime .verdict{font-size:19px;font-weight:800;margin-top:6px;line-height:1.35}
.regime.green .verdict{color:var(--green)} .regime.yellow .verdict{color:var(--amber)} .regime.red .verdict{color:var(--red)}
.lights{display:flex;flex-wrap:wrap;gap:7px;margin-top:13px}
.light{display:flex;align-items:center;gap:7px;background:var(--panel2);border:1px solid var(--line);
  border-radius:10px;padding:7px 10px;font-size:12px;flex:1 1 auto;min-width:calc(50% - 4px)}
.light .led{width:8px;height:8px;border-radius:50%;flex:none}
.light.green .led{background:var(--green);box-shadow:0 0 7px var(--green)}
.light.yellow .led{background:var(--amber);box-shadow:0 0 7px var(--amber)}
.light.red .led{background:var(--red);box-shadow:0 0 7px var(--red)}
.light .n{color:var(--dim);font-size:11px}
.light .v{color:var(--ink);font-weight:700;margin-left:auto}

/* ---- タブ ---- */
.tabs{display:flex;gap:0;margin:16px 14px 0;border-bottom:1px solid var(--line)}
.tab{flex:1;text-align:center;padding:10px 4px;font-size:13px;font-weight:700;color:var(--dim);
  background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:.15s}
.tab.active{color:var(--ink);border-bottom-color:var(--radar)}

.wrap{padding:16px 14px 0}
.pane{display:none} .pane.active{display:block}

/* ---- セクション見出し ---- */
.sec{font-size:11px;letter-spacing:.14em;color:var(--dim);font-weight:700;margin:4px 2px 10px;text-transform:uppercase}

/* ---- 銘柄カード ---- */
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:10px;
  position:relative;overflow:hidden}
.card .rank{position:absolute;top:11px;right:13px;font-size:11px;color:var(--faint);font-weight:800}
.crow{display:flex;align-items:baseline;gap:8px}
.code{font-size:12px;color:var(--dim);font-weight:700}
.nm{font-size:15px;font-weight:800;letter-spacing:.01em}
.stars{font-size:12px;letter-spacing:1px;margin-top:3px}
.s5{color:var(--gold)} .s4{color:#cdb24a} .s3{color:var(--dim)} .s2{color:var(--faint)} .s1{color:var(--faint)}
.metrics{display:flex;gap:14px;margin-top:11px;flex-wrap:wrap}
.metric{display:flex;flex-direction:column;gap:1px}
.metric .k{font-size:9px;color:var(--faint);letter-spacing:.08em;font-weight:700}
.metric .val{font-size:14px;font-weight:800}
.scoreBig{margin-left:auto;text-align:right}
.scoreBig .num{font-size:26px;font-weight:900;line-height:1}
.scoreBig .of{font-size:10px;color:var(--faint)}
.gap{display:inline-block;background:rgba(255,210,74,.14);color:var(--gold);border:1px solid rgba(255,210,74,.3);
  font-size:11px;font-weight:800;padding:2px 8px;border-radius:999px;margin-top:8px}
.reasons{margin-top:10px;font-size:12px;color:#aeb8cd;line-height:1.55}
.bar{display:flex;height:5px;border-radius:3px;overflow:hidden;margin-top:11px;background:var(--panel2)}
.bar i{height:100%}
.bar .b-link{background:var(--radar)} .bar .b-theme{background:#a98bff} .bar .b-sup{background:var(--green)}
.bar .b-etf{background:#ff9f4a} .bar .b-tech{background:var(--gold)} .bar .b-fund{background:#4a9fff} .bar .b-mat{background:#ff6fae}
.legend{display:flex;flex-wrap:wrap;gap:9px;margin:2px 2px 14px;font-size:10px;color:var(--dim)}
.legend span{display:flex;align-items:center;gap:4px}
.legend i{width:8px;height:8px;border-radius:2px;display:inline-block}

/* ---- レーダーツリー ---- */
.driver{background:var(--panel);border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden}
.driver .dh{display:flex;align-items:center;gap:10px;padding:13px 14px;background:linear-gradient(90deg,rgba(79,211,255,.08),transparent)}
.flag{font-size:16px}
.dname{font-weight:800;font-size:15px}
.dimp{margin-left:auto;font-weight:800;font-size:15px}
.dimp.up{color:var(--up)} .dimp.dn{color:var(--down)}
.leaf{display:flex;align-items:center;gap:10px;padding:10px 14px 10px 26px;border-top:1px solid var(--line);position:relative}
.leaf::before{content:"";position:absolute;left:16px;top:0;bottom:50%;width:1px;background:var(--line)}
.leaf::after{content:"";position:absolute;left:16px;top:50%;width:7px;height:1px;background:var(--line)}
.leaf:last-child::before{bottom:50%}
.leaf .lnm{font-size:14px;font-weight:700}
.leaf .lcode{font-size:11px;color:var(--dim);margin-left:2px}
.leaf .lstars{font-size:11px;margin-left:6px}
.leaf .lsc{margin-left:auto;font-weight:800;font-size:14px}
.leaf .lgap{font-size:10px;color:var(--gold);font-weight:800;background:rgba(255,210,74,.12);
  padding:1px 6px;border-radius:6px}

/* ---- ETF / テーマ ---- */
.flowrow,.themerow{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);
  border-radius:11px;padding:11px 13px;margin-bottom:8px}
.flowrow .t{font-weight:800;font-size:14px;width:52px}
.kindtag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px}
.kindtag.h{background:rgba(169,139,255,.16);color:#a98bff} .kindtag.u{background:rgba(61,220,132,.14);color:var(--green)}
.flowrow .f{margin-left:auto;font-weight:800;font-variant-numeric:tabular-nums}
.f.pos{color:var(--up)} .f.neg{color:var(--down)}
.themerow .tn{font-weight:700;font-size:13px}
.themebar{flex:1;height:6px;background:var(--panel2);border-radius:3px;overflow:hidden;margin:0 4px}
.themebar i{display:block;height:100%}
.themerow .ts{font-weight:800;font-size:13px;width:58px;text-align:right;font-variant-numeric:tabular-nums}

/* ---- 空状態・ローダー ---- */
.empty{text-align:center;color:var(--dim);padding:60px 30px;font-size:14px}
.empty .big{font-size:40px;margin-bottom:14px;opacity:.5}
.upload-btn{display:inline-block;margin-top:20px;background:var(--radar);color:#04121b;font-weight:800;
  padding:12px 22px;border-radius:11px;font-size:14px;border:none;cursor:pointer}
.hint{font-size:12px;color:var(--faint);margin-top:16px;line-height:1.7}

/* ---- 下部ナビ ---- */
nav{position:fixed;bottom:0;left:0;right:0;z-index:20;display:flex;
  background:rgba(10,14,23,.95);backdrop-filter:blur(12px);border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;background:none;border:none;color:var(--faint);padding:10px 4px 9px;font-size:10px;
  font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
nav button.on{color:var(--radar)}
nav button svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.reload{position:fixed;right:16px;bottom:calc(78px + env(safe-area-inset-bottom));z-index:19;
  width:46px;height:46px;border-radius:50%;background:var(--panel);border:1px solid var(--line);
  color:var(--ink);font-size:19px;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.4)}
input[type=file]{display:none}
/* ---- 詳細モーダル ---- */
.modal{position:fixed;inset:0;z-index:40;display:none}
.modal.open{display:block}
.modal-back{position:absolute;inset:0;background:rgba(4,7,13,.6);backdrop-filter:blur(2px);opacity:0;transition:.2s}
.modal.open .modal-back{opacity:1}
.sheet{position:absolute;left:0;right:0;bottom:0;max-height:88vh;overflow-y:auto;
  background:var(--panel);border-radius:20px 20px 0 0;border-top:1px solid var(--line);
  padding:8px 16px calc(28px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .26s cubic-bezier(.2,.8,.2,1)}
.modal.open .sheet{transform:translateY(0)}
.grab{width:38px;height:4px;border-radius:2px;background:var(--faint);margin:8px auto 14px}
.d-head{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
.d-code{font-size:13px;color:var(--dim);font-weight:700}
.d-name{font-size:20px;font-weight:800}
.d-sector{font-size:11px;color:var(--faint);margin-bottom:14px}
.d-scorewrap{display:flex;align-items:center;gap:16px;background:var(--panel2);border:1px solid var(--line);
  border-radius:14px;padding:14px 16px;margin-bottom:6px}
.d-scorewrap .big{font-size:38px;font-weight:900;line-height:1}
.d-scorewrap .stars{font-size:14px}
.d-gapbox{margin-left:auto;text-align:right}
.d-gapbox .lab{font-size:10px;color:var(--faint)}
.d-gapbox .v{font-size:18px;font-weight:800;color:var(--gold)}
.d-break{margin:16px 0 6px}
.brk-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.brk-row .bn{font-size:12px;color:var(--dim);width:74px;flex:none}
.brk-bar{flex:1;height:8px;background:var(--panel2);border-radius:4px;overflow:hidden}
.brk-bar i{display:block;height:100%}
.brk-row .bv{font-size:12px;font-weight:800;width:52px;text-align:right;font-variant-numeric:tabular-nums}
.d-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:16px 0}
.d-cell{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:10px 12px}
.d-cell .k{font-size:10px;color:var(--faint);font-weight:700;letter-spacing:.06em}
.d-cell .v{font-size:16px;font-weight:800;margin-top:2px;font-variant-numeric:tabular-nums}
.d-reasons{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:16px}
.d-reasons .rlab{font-size:10px;color:var(--faint);font-weight:700;letter-spacing:.1em;margin-bottom:8px}
.d-reasons ul{list-style:none;display:flex;flex-direction:column;gap:6px}
.d-reasons li{font-size:13px;color:#c5cee0;padding-left:16px;position:relative;line-height:1.5}
.d-reasons li::before{content:"▸";position:absolute;left:0;color:var(--radar)}
.d-links{display:flex;gap:8px}
.d-links a{flex:1;text-align:center;background:var(--panel2);border:1px solid var(--line);
  color:var(--ink);font-weight:700;font-size:13px;padding:13px 6px;border-radius:12px;text-decoration:none}
.d-links a:active{background:var(--line)}
.d-note{font-size:11px;color:var(--faint);margin-top:14px;line-height:1.6}
/* 変化バッジ */
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:2px}
.badge{font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px;letter-spacing:.02em}
.badge.new{background:rgba(61,220,132,.16);color:var(--green);border:1px solid rgba(61,220,132,.35)}
.badge.up{background:rgba(255,93,108,.14);color:var(--up);border:1px solid rgba(255,93,108,.3)}
.badge.dn{background:rgba(79,211,255,.12);color:var(--down);border:1px solid rgba(79,211,255,.3)}
.badge.gapx{background:rgba(255,210,74,.14);color:var(--gold);border:1px solid rgba(255,210,74,.3)}
/* ウォッチ★ */
.watch{position:absolute;top:9px;right:44px;font-size:19px;line-height:1;cursor:pointer;
  color:var(--faint);background:none;border:none;padding:2px 4px;z-index:2}
.watch.on{color:var(--gold)}
/* スパークライン */
.spark{margin:16px 0 4px}
.spark .slab{font-size:10px;color:var(--faint);font-weight:700;letter-spacing:.1em;margin-bottom:8px}
.spark svg{width:100%;height:64px;overflow:visible}
.spark .pt-lbl{font-size:10px;fill:var(--dim)}
/* ポジション電卓 */
.calc{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px;margin:16px 0}
.calc .clab{font-size:10px;color:var(--faint);font-weight:700;letter-spacing:.1em;margin-bottom:10px}
.calc-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.calc-row label{font-size:12px;color:var(--dim);flex:1}
.calc-row input{width:120px;background:var(--bg);border:1px solid var(--line);color:var(--ink);
  border-radius:8px;padding:8px 10px;font-size:14px;font-weight:700;text-align:right;font-variant-numeric:tabular-nums}
.calc-out{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:12px;margin-top:4px}
.calc-out .big{font-size:22px;font-weight:900;color:var(--radar)}
.calc-out .sub{font-size:11px;color:var(--dim);margin-top:3px}
/* タブ内セクション見出し用の空リスト */
.wl-empty{color:var(--dim);font-size:13px;text-align:center;padding:30px 20px}
/* シグナルバッジ（判定ラベル） */
.sig{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:800;padding:5px 11px;
  border-radius:9px;margin-top:9px}
.sig.fire{background:linear-gradient(90deg,rgba(255,93,108,.22),rgba(255,159,74,.18));
  color:#ff8a5c;border:1px solid rgba(255,120,90,.4)}
.sig.dip{background:rgba(255,210,74,.14);color:var(--gold);border:1px solid rgba(255,210,74,.34)}
.sig.watchS{background:rgba(79,211,255,.12);color:var(--cyan);border:1px solid rgba(79,211,255,.32)}
.sig.watch{background:var(--panel2);color:var(--dim);border:1px solid var(--line)}
.sig.pass{background:rgba(255,93,108,.1);color:var(--red);border:1px solid rgba(255,93,108,.28)}
/* チェックリスト */
.checks{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px;margin:16px 0}
.checks .clab{font-size:10px;color:var(--faint);font-weight:700;letter-spacing:.1em;margin-bottom:11px}
.chk{display:flex;align-items:flex-start;gap:9px;padding:6px 0;font-size:13px;line-height:1.4}
.chk .ic{width:19px;height:19px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:900;margin-top:1px}
.chk.pass .ic{background:rgba(61,220,132,.18);color:var(--green)}
.chk.fail .ic{background:rgba(122,134,158,.18);color:var(--faint)}
.chk .txt{color:#c5cee0}
.chk.fail .txt{color:var(--dim)}
.chk .cur{margin-left:auto;font-size:11px;font-weight:700;color:var(--faint);white-space:nowrap;padding-left:8px}
.verdict-line{font-size:13px;color:#aeb8cd;margin-top:12px;padding-top:12px;border-top:1px solid var(--line);line-height:1.6}
.sig-sum{border-radius:13px;padding:14px 16px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sig-sum b{font-size:16px}
.sig-sum.fire{background:linear-gradient(90deg,rgba(255,93,108,.2),rgba(255,159,74,.14));color:#ff9068;border:1px solid rgba(255,120,90,.4)}
.sig-sum.none{background:var(--panel);color:var(--dim);border:1px solid var(--line);cursor:default}
.sig-sum.red{background:rgba(255,93,108,.14);color:var(--red);border:1px solid rgba(255,93,108,.34);cursor:default}
.sig-sum .arr{margin-left:auto;font-size:12px;opacity:.8;font-weight:800}
.filterow{display:flex;gap:8px;margin-bottom:14px}
.chip{background:var(--panel);border:1px solid var(--line);color:var(--dim);font-size:12px;font-weight:700;
  padding:7px 13px;border-radius:999px;cursor:pointer;white-space:nowrap}
.chip.on{background:var(--radar);color:#04121b;border-color:var(--radar)}
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="dot"></span>
    <h1>AI市場レーダー</h1>
    <span class="ver" id="ver">v2</span>
  </div>
  <div class="stamp" id="stamp">データ未読込</div>
</header>

<!-- 地合いバナー -->
<div class="regime yellow" id="regime" style="display:none">
  <div class="lbl">MARKET REGIME ／ 地合い</div>
  <div class="verdict" id="verdict">—</div>
  <div class="lights" id="lights"></div>
</div>

<!-- 本日のシグナルサマリー -->
<div id="sigSummary" style="display:none;margin:12px 14px 0"></div>

<!-- タブ -->
<div class="tabs" id="tabs" style="display:none">
  <button class="tab active" data-p="rank">TOP30</button>
  <button class="tab" data-p="radar">レーダー</button>
  <button class="tab" data-p="flow">資金</button>
  <button class="tab" data-p="watch">★</button>
</div>

<div class="wrap">
  <!-- TOP30 -->
  <div class="pane active" id="pane-rank">
    <div class="filterow filterow-js" id="filters" style="display:none">
      <div class="chip on" data-f="all">全銘柄</div>
      <div class="chip" data-f="fire">🔥候補のみ</div>
      <div class="chip" data-f="gap">未反応のみ</div>
      <div class="chip" data-f="rs">RS＞0のみ</div>
    </div>
    <div class="legend" id="legend" style="display:none">
      <span><i style="background:var(--radar)"></i>海外連動</span>
      <span><i style="background:#a98bff"></i>テーマ</span>
      <span><i style="background:var(--green)"></i>出来高</span>
      <span><i style="background:#ff9f4a"></i>ETF</span>
      <span><i style="background:var(--gold)"></i>技術</span>
      <span><i style="background:#4a9fff"></i>業績</span>
      <span><i style="background:#ff6fae"></i>材料</span>
    </div>
    <div id="rankList"></div>
  </div>
  <!-- レーダー -->
  <div class="pane" id="pane-radar">
    <div class="sec">米国ドライバー → 日本株への波及</div>
    <div id="radarList"></div>
  </div>
  <!-- 資金・テーマ -->
  <div class="pane" id="pane-flow">
    <div class="sec">ETF資金フロー（口数ベース・百万ドル）</div>
    <div id="flowList"></div>
    <div class="sec" style="margin-top:22px">テーマ強度（メンバー5日平均リターン）</div>
    <div id="themeList"></div>
  </div>

  <!-- ウォッチリスト -->
  <div class="pane" id="pane-watch">
    <div class="sec">ウォッチリスト（端末に保存）</div>
    <div id="watchList"></div>
  </div>

  <!-- 空状態 -->
  <div class="empty" id="empty">
    <div class="big">📡</div>
    <div>レーダーデータを読み込みます</div>
    <div class="hint" id="emptyHint">同じ場所の results.json を探しています…</div>
    <label class="upload-btn" for="file">ファイルを選ぶ</label>
    <div class="hint">Colabで出力した <b>results.json</b> を選んで表示することもできます</div>
  </div>
</div>

<button class="reload" id="reload" title="再読込" style="display:none">⟳</button>
<input type="file" id="file" accept="application/json,.json">

<nav id="nav" style="display:none">
  <button class="on" data-p="rank"><svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>ランキング</button>
  <button data-p="radar"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/><path d="M12 3v4M12 17v4M3 12h4M17 12h4"/></svg>レーダー</button>
  <button data-p="flow"><svg viewBox="0 0 24 24"><path d="M4 18V9M10 18V5M16 18v-7M20 18v-4"/></svg>資金</button>
  <button data-p="watch"><svg viewBox="0 0 24 24"><path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z"/></svg>ウォッチ</button>
</nav>

<!-- 詳細モーダル -->
<div class="modal" id="modal" aria-hidden="true">
  <div class="modal-back" id="modalBack"></div>
  <div class="sheet" id="sheet">
    <div class="grab"></div>
    <div id="detail"></div>
  </div>
</div>

<script>
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
let DATA=null, filter="all";
// ウォッチリスト: GitHub Pages配布先ではlocalStorageで永続化される
const WKEY="radar_watch";
function loadWatch(){try{return JSON.parse(localStorage.getItem(WKEY)||"[]")}catch(e){return []}}
function saveWatch(a){try{localStorage.setItem(WKEY,JSON.stringify(a))}catch(e){}}
let WATCH=loadWatch();
function isWatched(c){return WATCH.includes(c)}
function toggleWatch(c,ev){
  if(ev) ev.stopPropagation();
  if(isWatched(c)) WATCH=WATCH.filter(x=>x!==c); else WATCH=[...WATCH,c];
  saveWatch(WATCH); renderRank(); renderWatch();
  const m=document.querySelector(`.watch[data-c="${c}"]`); if(m) m.classList.toggle("on",isWatched(c));
}

function starClass(s){const n=(s.match(/★/g)||[]).length;return "s"+Math.min(5,Math.max(1,n));}
function fmtNum(n){return (n==null||isNaN(n))?"—":Number(n).toLocaleString();}
function sign(n){return (n>0?"+":"")+n.toFixed(1);}

async function tryFetch(){
  try{
    const r=await fetch("results.json",{cache:"no-store"});
    if(!r.ok) throw 0;
    const j=await r.json(); render(j); return true;
  }catch(e){ return false; }
}

function boot(){
  tryFetch().then(ok=>{
    if(!ok){
      $("#emptyHint").textContent="results.json が見つかりませんでした。ファイルを選ぶか、GitHubに置いてください。";
    }
  });
}

$("#file").addEventListener("change",e=>{
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ try{ render(JSON.parse(rd.result)); }catch(err){ alert("JSONの読み込みに失敗しました: "+err.message);} };
  rd.readAsText(f);
});
$("#reload").addEventListener("click",boot);

function render(j){
  DATA=j;
  $("#empty").style.display="none";
  ["#regime","#tabs","#nav","#reload","#filters","#legend"].forEach(s=>$(s).style.display="");
  $("#tabs").style.display="flex"; $("#nav").style.display="flex"; $("#filters").style.display="flex";
  $("#ver").textContent=j.version||"v2";
  const dt=(j.generated_at||"").replace("T"," ");
  $("#stamp").textContent="更新: "+dt;

  // 本日のシグナルサマリー
  const fires=(j.stocks||[]).filter(x=>(x.signal||"").indexOf("新規買い")>=0);
  const dips=(j.stocks||[]).filter(x=>(x.signal||"").indexOf("押し目")>=0);
  const sum=$("#sigSummary");
  if(sum){
    if((j.market_env||{}).regime==="red"){
      sum.innerHTML=`<div class="sig-sum red">⛔ 地合い悪化中 — 本日は新規見送り推奨</div>`;
    }else if(fires.length){
      sum.innerHTML=`<div class="sig-sum fire" onclick="filter='fire';document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c.dataset.f==='fire'));switchPane('rank');renderRank();">
        🔥 本日の新規買い候補 <b>${fires.length}銘柄</b> ${dips.length?`／ ⏳押し目待ち ${dips.length}`:""} <span class="arr">タップで表示 ›</span></div>`;
    }else{
      sum.innerHTML=`<div class="sig-sum none">本日の新規買い候補なし ${dips.length?`／ ⏳押し目待ち ${dips.length}銘柄`:"— 監視継続"}</div>`;
    }
    sum.style.display="";
  }
  // 地合い
  const me=j.market_env||{};
  const rg=$("#regime"); rg.className="regime "+(me.regime||"yellow");
  $("#verdict").textContent=me.label||"データなし";
  $("#lights").innerHTML=(me.lights||[]).map(l=>`
    <div class="light ${l.color}"><span class="led"></span>
      <span class="n">${l.name}</span><span class="v">${l.value}</span></div>`).join("");

  renderRank(); renderRadar(); renderFlow(); renderWatch();
}

function renderWatch(){
  const el=$("#watchList"); if(!el) return;
  const items=WATCH.map(c=>findStock(c)).filter(Boolean);
  if(!WATCH.length){ el.innerHTML=`<div class="wl-empty">まだありません。<br>銘柄カードの ☆ をタップすると、ここに保存されます。</div>`; return; }
  // 保存済みだが今日のデータに無いコードも表示（名前だけ）
  const html=WATCH.map(c=>{
    const s=findStock(c);
    if(!s) return `<div class="card"><button class="watch on" onclick="toggleWatch('${c}',event)">★</button>
      <div class="crow"><span class="code">${c}</span><span class="nm" style="color:var(--dim)">（本日圏外）</span></div>
      <div class="reasons">今日のランキングには入っていません</div></div>`;
    const wOn="on";const badges=changeBadges(s);
    return `<div class="card" onclick="openDetail('${s.code}')">
      <button class="watch on" data-c="${s.code}" onclick="toggleWatch('${s.code}',event)">★</button>
      <div class="crow"><span class="code">${s.code}</span><span class="nm">${s.name}</span>
        <div class="scoreBig"><div class="num" style="color:${scoreColor(s.score)}">${Math.round(s.score)}</div><div class="of">/100</div></div></div>
      <div class="stars ${starClass(s.stars||"")}">${s.stars||""}</div>${badges}
      <div class="metrics">
        <div class="metric"><span class="k">株価</span><span class="val mono">${fmtNum(s.close)}</span></div>
        <div class="metric"><span class="k">5日</span><span class="val mono" style="color:${(s.chg5d||0)>0?'var(--up)':'var(--down)'}">${sign(s.chg5d||0)}%</span></div>
        <div class="metric"><span class="k">RS20</span><span class="val mono" style="color:${(s.rs20||0)>0?'var(--green)':'var(--dim)'}">${sign(s.rs20||0)}</span></div>
      </div></div>`;
  }).join("");
  el.innerHTML=html;
}

function passFilter(s){
  if(filter==="fire") return (s.signal||"").indexOf("新規買い")>=0;
  if(filter==="gap")  return (s.gap_pct||0)>0.5;
  if(filter==="rs")   return (s.rs20||0)>0;
  return true;
}

function renderRank(){
  const list=(DATA.stocks||[]).filter(passFilter).slice(0,30);
  $("#rankList").innerHTML=list.map((s,i)=>{
    const parts=[["b-link",s.linkage],["b-theme",s.theme],["b-sup",s.supply],
      ["b-etf",s.etf],["b-tech",s.tech],["b-fund",s.fund],["b-mat",s.material]];
    const tot=parts.reduce((a,[,v])=>a+(v||0),0)||1;
    const bar=parts.map(([c,v])=>`<i class="${c}" style="width:${(v||0)/tot*100}%"></i>`).join("");
    const gap=(s.gap_pct||0)>0.5?`<div class="gap">未反応ギャップ +${s.gap_pct.toFixed(1)}%</div>`:"";
    const rsCol=(s.rs20||0)>0?"var(--green)":"var(--dim)";
    const badges=changeBadges(s);
    const wOn=isWatched(s.code)?"on":"";
    return `<div class="card" onclick="openDetail('${s.code}')">
      <span class="rank">#${i+1}</span>
      <button class="watch ${wOn}" data-c="${s.code}" onclick="toggleWatch('${s.code}',event)">${isWatched(s.code)?"★":"☆"}</button>
      <div class="crow"><span class="code">${s.code}</span><span class="nm">${s.name}</span>
        <div class="scoreBig"><div class="num" style="color:${scoreColor(s.score)}">${Math.round(s.score)}</div><div class="of">/100</div></div>
      </div>
      <div class="stars ${starClass(s.stars||"")}">${s.stars||""}</div>
      ${sigBadge(s.signal)}
      ${badges}
      ${gap}
      <div class="metrics">
        <div class="metric"><span class="k">株価</span><span class="val mono">${fmtNum(s.close)}</span></div>
        <div class="metric"><span class="k">5日</span><span class="val mono" style="color:${(s.chg5d||0)>0?'var(--up)':'var(--down)'}">${sign(s.chg5d||0)}%</span></div>
        <div class="metric"><span class="k">RS20</span><span class="val mono" style="color:${rsCol}">${sign(s.rs20||0)}</span></div>
        <div class="metric"><span class="k">出来高</span><span class="val mono">${(s.v_ratio||0).toFixed(1)}x</span></div>
        <div class="metric"><span class="k">損切目安</span><span class="val mono">${fmtNum(s.stop)}</span></div>
      </div>
      <div class="bar">${bar}</div>
      <div class="reasons">${s.reasons_str||"—"}</div>
    </div>`;
  }).join("") || `<div class="empty" style="padding:40px 20px">条件に合う銘柄がありません</div>`;
}

function scoreColor(s){return s>=70?"var(--gold)":s>=60?"var(--green)":s>=50?"var(--cyan)":"var(--dim)";}

function sigMeta(sig){
  if(!sig) return null;
  if(sig.indexOf("新規買い")>=0) return {cls:"fire",icon:"🔥",label:"新規買い候補"};
  if(sig.indexOf("押し目")>=0)   return {cls:"dip",icon:"⏳",label:"押し目待ち"};
  if(sig.indexOf("見送り")>=0)   return {cls:"pass",icon:"⛔",label:sig};
  if(sig.indexOf("監視(強")>=0)  return {cls:"watchS",icon:"◉",label:"監視（強）"};
  if(sig.indexOf("監視")>=0)     return {cls:"watch",icon:"○",label:"監視"};
  return null;
}
function sigBadge(sig){
  const m=sigMeta(sig); if(!m) return "";
  return `<div class="sig ${m.cls}">${m.icon} ${m.label}</div>`;
}

function checklistHTML(s){
  const c=(DATA.signal_conditions)||{min_score:65,min_gap:1.0,min_v_ratio:1.5,max_dev25:15};
  const regime=(DATA.market_env||{}).regime;
  // 各条件: [ラベル, 満たすか, 現在値]
  const rows=[
    ["地合いが🔴でない", regime!=="red", regime==="green"?"🟢良好":regime==="yellow"?"🟡選別":"🔴悪化"],
    [`総合スコア ${c.min_score}点以上`, s.score>=c.min_score, `${Math.round(s.score)}点`],
    ["日経より強い（RS20>0）", (s.rs20||0)>0, sign(s.rs20||0)],
    [`未反応ギャップ +${c.min_gap}%以上`, (s.gap_pct||0)>=c.min_gap, `+${(s.gap_pct||0).toFixed(1)}%`],
    [`出来高 ${c.min_v_ratio}倍以上`, (s.v_ratio||0)>=c.min_v_ratio, `${(s.v_ratio||0).toFixed(1)}x`],
    [`過熱でない（25MA乖離 ${c.max_dev25}%以下）`, (s.dev25||0)<=c.max_dev25, `+${(s.dev25||0).toFixed(1)}%`],
  ];
  const items=rows.map(([txt,ok,cur])=>`
    <div class="chk ${ok?'pass':'fail'}">
      <span class="ic">${ok?'✓':'−'}</span>
      <span class="txt">${txt}</span><span class="cur">${cur}</span>
    </div>`).join("");
  const passed=rows.filter(r=>r[1]).length;
  const m=sigMeta(s.signal);
  let verdict;
  if(m&&m.cls==="fire") verdict="全条件クリア。エントリーを検討できる状態ですが、必ずチャートと開示を自分の目で確認してください。";
  else if(m&&m.cls==="dip") verdict="強い銘柄ですが25MAから離れすぎ。今は追わず、押し目（25MA接近）を待つのが安全です。";
  else if(regime==="red") verdict="地合いが悪いため、どんな高スコアでも新規は見送り推奨です。";
  else verdict=`条件を ${passed}/6 クリア。あと ${6-passed} 個揃うと新規買い候補になります。監視を継続。`;
  return `<div class="checks"><div class="clab">新規買いチェックリスト（${passed}/6 クリア）</div>
    ${items}<div class="verdict-line">${verdict}</div></div>`;
}

function changeBadges(s){
  const out=[]; const prev=DATA.prev_codes||[]; const d=(DATA.deltas||{})[s.code];
  // 新規ランクイン: 前日のコード一覧にいなかった
  if(prev.length && !prev.includes(s.code)) out.push('<span class="badge new">NEW ランクイン</span>');
  if(d!=null && Math.abs(d)>=3){
    if(d>0) out.push(`<span class="badge up">▲ +${d.toFixed(0)}点</span>`);
    else out.push(`<span class="badge dn">▼ ${d.toFixed(0)}点</span>`);
  }
  return out.length?`<div class="badges">${out.join("")}</div>`:"";
}

function renderRadar(){
  const rd=DATA.radar||[];
  $("#radarList").innerHTML = rd.length? rd.map(d=>{
    const up=(d.impulse_pct||0)>=0;
    const leaves=(d.stocks||[]).map(s=>{
      const gap=(s.gap_pct||0)>0.5?`<span class="lgap">未反応+${s.gap_pct.toFixed(1)}%</span>`:"";
      return `<div class="leaf" onclick="openDetail('${s.code}')">
        <span class="lnm">${s.name}<span class="lcode">${s.code}</span>
        <span class="lstars ${starClass(s.stars||"")}">${s.stars||""}</span></span>
        ${gap}<span class="lsc" style="color:${scoreColor(s.score)}">${Math.round(s.score)}</span></div>`;
    }).join("");
    return `<div class="driver">
      <div class="dh"><span class="flag">🇺🇸</span><span class="dname">${d.driver}</span>
        <span class="dimp ${up?'up':'dn'}">${sign(d.impulse_pct||0)}%</span></div>
      ${leaves}</div>`;
  }).join("") : `<div class="empty" style="padding:40px 20px">直近に大きく動いた米国ドライバーがありません</div>`;
}

function renderFlow(){
  const fl=DATA.etf_flows||{}, hedged=["DXJ","HEWJ","DBJP"];
  const rows=Object.entries(fl).sort((a,b)=>b[1]-a[1]);
  $("#flowList").innerHTML = rows.length? rows.map(([t,v])=>{
    const h=hedged.includes(t);
    return `<div class="flowrow"><span class="t">${t}</span>
      <span class="kindtag ${h?'h':'u'}">${h?'ヘッジ':'無ヘッジ'}</span>
      <span class="f ${v>=0?'pos':'neg'}">${v>=0?'+':''}${v.toFixed(1)}M$</span></div>`;
  }).join("") : `<div class="empty" style="padding:30px 20px;font-size:13px">ETFフローは2回目の実行から表示されます</div>`;

  const th=DATA.theme_strength||{};
  const te=Object.entries(th).sort((a,b)=>b[1]-a[1]);
  const mx=Math.max(1,...te.map(([,v])=>Math.abs(v)));
  $("#themeList").innerHTML=te.map(([n,v])=>{
    const col=v>=0?"var(--up)":"var(--down)";
    return `<div class="themerow"><span class="tn">${n}</span>
      <span class="themebar"><i style="width:${Math.abs(v)/mx*100}%;background:${col}"></i></span>
      <span class="ts" style="color:${col}">${sign(v)}%</span></div>`;
  }).join("");
}

// ---- 詳細モーダル ----
const B_LABELS={linkage:["海外連動","var(--radar)"],theme:["テーマ","#a98bff"],
  supply:["出来高","var(--green)"],etf:["ETFフロー","#ff9f4a"],
  tech:["テクニカル","var(--gold)"],fund:["業績","#4a9fff"],material:["材料","#ff6fae"]};
const B_MAX={linkage:30,theme:20,supply:10,etf:5,tech:15,fund:10,material:10};

function findStock(code){return (DATA.stocks||[]).find(s=>s.code===code);}

function sparkHTML(code){
  const h=(DATA.history||{})[code];
  if(!h||h.length<2) return "";
  const W=300,H=52,pad=6;
  const xs=h.map((_,i)=>pad+i*(W-2*pad)/(h.length-1));
  const vals=h.map(p=>p.score);
  const mn=Math.min(...vals,0), mx=Math.max(...vals,100);
  const y=v=>H-pad-(v-mn)/(mx-mn||1)*(H-2*pad);
  const pts=h.map((p,i)=>`${xs[i]},${y(p.score)}`).join(" ");
  const last=h[h.length-1], first=h[0];
  const dScore=last.score-first.score;
  const col=dScore>=0?"var(--up)":"var(--down)";
  const dots=h.map((p,i)=>`<circle cx="${xs[i]}" cy="${y(p.score)}" r="${i===h.length-1?3.5:2}" fill="${col}"/>`).join("");
  // 直近点のラベル
  return `<div class="spark"><div class="slab">スコア推移（直近${h.length}回）　${dScore>=0?"+":""}${dScore.toFixed(0)}点</div>
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round"/>
      ${dots}
      <text class="pt-lbl" x="${xs[0]}" y="${y(first.score)-6}">${first.score.toFixed(0)}</text>
      <text class="pt-lbl" x="${xs[xs.length-1]}" y="${y(last.score)-6}" text-anchor="end">${last.score.toFixed(0)}</text>
    </svg></div>`;
}

function calcHTML(s){
  const stop=s.stop||0, price=s.close||0;
  const risk=price>0?price-stop:0;
  return `<div class="calc"><div class="clab">ポジションサイジング（損切りから逆算）</div>
    <div class="calc-row"><label>1回の許容損失額</label>
      <input id="calcRisk" type="number" inputmode="numeric" placeholder="例 30000" value="30000" oninput="recalc(${price},${stop})"></div>
    <div class="calc-row"><label>エントリー価格</label>
      <input id="calcEntry" type="number" inputmode="numeric" value="${Math.round(price)}" oninput="recalc(${price},${stop})"></div>
    <div class="calc-row"><label>損切り価格</label>
      <input id="calcStop" type="number" inputmode="numeric" value="${Math.round(stop)}" oninput="recalc(${price},${stop})"></div>
    <div class="calc-out" id="calcOut"></div></div>`;
}
function recalc(){
  const risk=+($("#calcRisk")?.value||0), entry=+($("#calcEntry")?.value||0), stop=+($("#calcStop")?.value||0);
  const per=entry-stop;
  const out=$("#calcOut"); if(!out) return;
  if(per<=0||risk<=0){ out.innerHTML=`<div class="sub">損切り価格はエントリーより下に設定してください</div>`; return; }
  const shares=Math.floor(risk/per);
  const unit=Math.max(100,Math.floor(shares/100)*100); // 単元(100株)に丸め
  const cost=unit*entry, realRisk=unit*per;
  out.innerHTML=`<div class="big">${unit.toLocaleString()}株</div>
    <div class="sub">必要資金 約${Math.round(cost).toLocaleString()}円 ／ 実際の損失リスク 約${Math.round(realRisk).toLocaleString()}円（単元100株に調整）</div>`;
}

function openDetail(code){
  const s=findStock(code); if(!s) return;
  const brk=Object.keys(B_LABELS).map(k=>{
    const v=s[k]||0, [lab,col]=B_LABELS[k], pct=Math.min(100,v/B_MAX[k]*100);
    return `<div class="brk-row"><span class="bn">${lab}</span>
      <span class="brk-bar"><i style="width:${pct}%;background:${col}"></i></span>
      <span class="bv">${v.toFixed(0)} / ${B_MAX[k]}</span></div>`;
  }).join("");
  const gapBox=(s.gap_pct||0)>0.5
    ? `<div class="d-gapbox"><div class="lab">未反応ギャップ</div><div class="v">+${s.gap_pct.toFixed(1)}%</div></div>`
    : (s.driver?`<div class="d-gapbox"><div class="lab">連動元</div><div class="v" style="color:var(--radar);font-size:14px">${s.driver}</div></div>`:"");
  const reasons=(s.reasons_str||"").split(" / ").filter(Boolean).map(r=>`<li>${r}</li>`).join("")||"<li>—</li>";
  const cells=[
    ["株価",`${fmtNum(s.close)}円`],["5日騰落",`${sign(s.chg5d||0)}%`],
    ["RS20（対日経）",sign(s.rs20||0)],["出来高倍率",`${(s.v_ratio||0).toFixed(1)}x`],
    ["25MA乖離",`${sign(s.dev25||0)}%`],["ATR（変動幅）",`${(s.atr_pct||0).toFixed(1)}%`],
    ["損切り目安",`${fmtNum(s.stop)}円`],["売買代金",`${fmtNum(s.turnover_m)}百万`],
  ].map(([k,v])=>`<div class="d-cell"><div class="k">${k}</div><div class="v">${v}</div></div>`).join("");
  // 外部リンク: 株探・Yahoo・TDnet
  const kab=`https://kabutan.jp/stock/?code=${s.code}`;
  const yah=`https://finance.yahoo.co.jp/quote/${s.code}.T`;
  const tdn=`https://www.release.tdnet.info/inbs/I_main_00.html`;
  $("#detail").innerHTML=`
    <div class="d-head"><span class="d-code">${s.code}</span><span class="d-name">${s.name}</span></div>
    <div class="d-sector">${s.sector||""}</div>
    <div class="d-scorewrap">
      <div><div class="big" style="color:${scoreColor(s.score)}">${Math.round(s.score)}</div>
        <div class="stars ${starClass(s.stars||"")}">${s.stars||""}</div></div>
      ${gapBox}
    </div>
    ${sparkHTML(s.code)}
    ${checklistHTML(s)}
    <div class="d-break">${brk}</div>
    <div class="d-grid">${cells}</div>
    <div class="d-reasons"><div class="rlab">スコアの根拠（点数の領収書）</div><ul>${reasons}</ul></div>
    ${calcHTML(s)}
    <div class="d-links">
      <a href="${kab}" target="_blank" rel="noopener">株探 ↗</a>
      <a href="${yah}" target="_blank" rel="noopener">Yahoo ↗</a>
      <a href="${tdn}" target="_blank" rel="noopener">TDnet ↗</a>
    </div>
    <div class="d-note">※ スコアは調査候補の提示であり売買推奨ではありません。エントリー前に必ずチャートと開示を確認してください。損切り目安＝終値−2×ATR。</div>`;
  $("#modal").classList.add("open"); $("#modal").setAttribute("aria-hidden","false");
  document.body.style.overflow="hidden";
  recalc();  // 電卓の初期表示
  // 履歴連携: 戻るボタンで閉じる
  if(!history.state||!history.state.modal){ history.pushState({modal:true},""); }
}
function closeDetail(fromPop){
  const m=$("#modal"); if(!m.classList.contains("open")) return;
  m.classList.remove("open"); m.setAttribute("aria-hidden","true");
  document.body.style.overflow="";
  if(!fromPop && history.state&&history.state.modal){ history.back(); }
}
$("#modalBack").addEventListener("click",()=>closeDetail());
window.addEventListener("popstate",()=>closeDetail(true));

// タブ切替
function switchPane(p){
  $$(".pane").forEach(x=>x.classList.remove("active"));
  $("#pane-"+p).classList.add("active");
  $$(".tab").forEach(x=>x.classList.toggle("active",x.dataset.p===p));
  $$("nav button").forEach(x=>x.classList.toggle("on",x.dataset.p===p));
  window.scrollTo(0,0);
}
$$(".tab").forEach(b=>b.onclick=()=>switchPane(b.dataset.p));
$$("nav button").forEach(b=>b.onclick=()=>switchPane(b.dataset.p));
$$(".chip").forEach(c=>c.onclick=()=>{
  $$(".chip").forEach(x=>x.classList.remove("on")); c.classList.add("on");
  filter=c.dataset.f; renderRank();
});

boot();
</script>
</body>
</html>
