<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0e17">
<title>AI市場レーダー</title>
<style>
:root{
  --bg:#0a0e17; --panel:#111725; --panel2:#161d2e; --line:#232c40;
  --ink:#e8ecf4; --dim:#7a869e; --faint:#4a5570;
  --green:#3ddc84; --amber:#ffc94d; --red:#ff5d6c;
  --cyan:#4fd3ff; --gold:#ffd24a; --up:#ff5d6c; --down:#4fd3ff;
  --radar:#4fd3ff;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
  padding:env(safe-area-inset-top) 0 calc(72px + env(safe-area-inset-bottom));
  line-height:1.5; font-feature-settings:"palt";
}
/* 数字は等幅で桁を揃える */
.mono{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}

/* ---- ヘッダー ---- */
header{
  position:sticky; top:0; z-index:20; background:rgba(10,14,23,.92);
  backdrop-filter:blur(12px); border-bottom:1px solid var(--line);
  padding:14px 18px 12px;
}
.brand{display:flex;align-items:center;gap:9px}
.brand .dot{width:9px;height:9px;border-radius:50%;background:var(--radar);
  box-shadow:0 0 0 0 var(--radar);animation:ping 2.4s ease-out infinite}
@keyframes ping{0%{box-shadow:0 0 0 0 rgba(79,211,255,.5)}70%,100%{box-shadow:0 0 0 10px rgba(79,211,255,0)}}
.brand h1{font-size:16px;font-weight:800;letter-spacing:.02em}
.brand .ver{font-size:10px;color:var(--faint);font-weight:600;margin-left:auto;letter-spacing:.08em}
.stamp{font-size:11px;color:var(--dim);margin-top:3px}

/* ---- 地合いバナー ---- */
.regime{margin:14px 14px 0;border-radius:16px;padding:16px 16px 14px;position:relative;overflow:hidden;
  border:1px solid var(--line);background:var(--panel)}
.regime::before{content:"";position:absolute;inset:0;opacity:.10;pointer-events:none}
.regime.green::before{background:radial-gradient(120% 100% at 0% 0%,var(--green),transparent 60%)}
.regime.yellow::before{background:radial-gradient(120% 100% at 0% 0%,var(--amber),transparent 60%)}
.regime.red::before{background:radial-gradient(120% 100% at 0% 0%,var(--red),transparent 60%)}
.regime .lbl{font-size:11px;color:var(--dim);letter-spacing:.14em;font-weight:700}
.regime .verdict{font-size:19px;font-weight:800;margin-top:6px;line-height:1.35}
.regime.green .verdict{color:var(--green)} .regime.yellow .verdict{color:var(--amber)} .regime.red .verdict{color:var(--red)}
.lights{display:flex;flex-wrap:wrap;gap:7px;margin-top:13px}
.light{display:flex;align-items:center;gap:7px;background:var(--panel2);border:1px solid var(--line);
  border-radius:10px;padding:7px 10px;font-size:12px;flex:1 1 auto;min-width:calc(50% - 4px)}
.light .led{width:8px;height:8px;border-radius:50%;flex:none}
.light.green .led{background:var(--green);box-shadow:0 0 7px var(--green)}
.light.yellow .led{background:var(--amber);box-shadow:0 0 7px var(--amber)}
.light.red .led{background:var(--red);box-shadow:0 0 7px var(--red)}
.light .n{color:var(--dim);font-size:11px}
.light .v{color:var(--ink);font-weight:700;margin-left:auto}

/* ---- タブ ---- */
.tabs{display:flex;gap:0;margin:16px 14px 0;border-bottom:1px solid var(--line)}
.tab{flex:1;text-align:center;padding:10px 4px;font-size:13px;font-weight:700;color:var(--dim);
  background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:.15s}
.tab.active{color:var(--ink);border-bottom-color:var(--radar)}

.wrap{padding:16px 14px 0}
.pane{display:none} .pane.active{display:block}

/* ---- セクション見出し ---- */
.sec{font-size:11px;letter-spacing:.14em;color:var(--dim);font-weight:700;margin:4px 2px 10px;text-transform:uppercase}

/* ---- 銘柄カード ---- */
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:10px;
  position:relative;overflow:hidden}
.card .rank{position:absolute;top:11px;right:13px;font-size:11px;color:var(--faint);font-weight:800}
.crow{display:flex;align-items:baseline;gap:8px}
.code{font-size:12px;color:var(--dim);font-weight:700}
.nm{font-size:15px;font-weight:800;letter-spacing:.01em}
.stars{font-size:12px;letter-spacing:1px;margin-top:3px}
.s5{color:var(--gold)} .s4{color:#cdb24a} .s3{color:var(--dim)} .s2{color:var(--faint)} .s1{color:var(--faint)}
.metrics{display:flex;gap:14px;margin-top:11px;flex-wrap:wrap}
.metric{display:flex;flex-direction:column;gap:1px}
.metric .k{font-size:9px;color:var(--faint);letter-spacing:.08em;font-weight:700}
.metric .val{font-size:14px;font-weight:800}
.scoreBig{margin-left:auto;text-align:right}
.scoreBig .num{font-size:26px;font-weight:900;line-height:1}
.scoreBig .of{font-size:10px;color:var(--faint)}
.gap{display:inline-block;background:rgba(255,210,74,.14);color:var(--gold);border:1px solid rgba(255,210,74,.3);
  font-size:11px;font-weight:800;padding:2px 8px;border-radius:999px;margin-top:8px}
.reasons{margin-top:10px;font-size:12px;color:#aeb8cd;line-height:1.55}
.bar{display:flex;height:5px;border-radius:3px;overflow:hidden;margin-top:11px;background:var(--panel2)}
.bar i{height:100%}
.bar .b-link{background:var(--radar)} .bar .b-theme{background:#a98bff} .bar .b-sup{background:var(--green)}
.bar .b-etf{background:#ff9f4a} .bar .b-tech{background:var(--gold)} .bar .b-fund{background:#4a9fff} .bar .b-mat{background:#ff6fae}
.legend{display:flex;flex-wrap:wrap;gap:9px;margin:2px 2px 14px;font-size:10px;color:var(--dim)}
.legend span{display:flex;align-items:center;gap:4px}
.legend i{width:8px;height:8px;border-radius:2px;display:inline-block}

/* ---- レーダーツリー ---- */
.driver{background:var(--panel);border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden}
.driver .dh{display:flex;align-items:center;gap:10px;padding:13px 14px;background:linear-gradient(90deg,rgba(79,211,255,.08),transparent)}
.flag{font-size:16px}
.dname{font-weight:800;font-size:15px}
.dimp{margin-left:auto;font-weight:800;font-size:15px}
.dimp.up{color:var(--up)} .dimp.dn{color:var(--down)}
.leaf{display:flex;align-items:center;gap:10px;padding:10px 14px 10px 26px;border-top:1px solid var(--line);position:relative}
.leaf::before{content:"";position:absolute;left:16px;top:0;bottom:50%;width:1px;background:var(--line)}
.leaf::after{content:"";position:absolute;left:16px;top:50%;width:7px;height:1px;background:var(--line)}
.leaf:last-child::before{bottom:50%}
.leaf .lnm{font-size:14px;font-weight:700}
.leaf .lcode{font-size:11px;color:var(--dim);margin-left:2px}
.leaf .lstars{font-size:11px;margin-left:6px}
.leaf .lsc{margin-left:auto;font-weight:800;font-size:14px}
.leaf .lgap{font-size:10px;color:var(--gold);font-weight:800;background:rgba(255,210,74,.12);
  padding:1px 6px;border-radius:6px}

/* ---- ETF / テーマ ---- */
.flowrow,.themerow{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);
  border-radius:11px;padding:11px 13px;margin-bottom:8px}
.flowrow .t{font-weight:800;font-size:14px;width:52px}
.kindtag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px}
.kindtag.h{background:rgba(169,139,255,.16);color:#a98bff} .kindtag.u{background:rgba(61,220,132,.14);color:var(--green)}
.flowrow .f{margin-left:auto;font-weight:800;font-variant-numeric:tabular-nums}
.f.pos{color:var(--up)} .f.neg{color:var(--down)}
.themerow .tn{font-weight:700;font-size:13px}
.themebar{flex:1;height:6px;background:var(--panel2);border-radius:3px;overflow:hidden;margin:0 4px}
.themebar i{display:block;height:100%}
.themerow .ts{font-weight:800;font-size:13px;width:58px;text-align:right;font-variant-numeric:tabular-nums}

/* ---- 空状態・ローダー ---- */
.empty{text-align:center;color:var(--dim);padding:60px 30px;font-size:14px}
.empty .big{font-size:40px;margin-bottom:14px;opacity:.5}
.upload-btn{display:inline-block;margin-top:20px;background:var(--radar);color:#04121b;font-weight:800;
  padding:12px 22px;border-radius:11px;font-size:14px;border:none;cursor:pointer}
.hint{font-size:12px;color:var(--faint);margin-top:16px;line-height:1.7}

/* ---- 下部ナビ ---- */
nav{position:fixed;bottom:0;left:0;right:0;z-index:20;display:flex;
  background:rgba(10,14,23,.95);backdrop-filter:blur(12px);border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;background:none;border:none;color:var(--faint);padding:10px 4px 9px;font-size:10px;
  font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
nav button.on{color:var(--radar)}
nav button svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.reload{position:fixed;right:16px;bottom:calc(78px + env(safe-area-inset-bottom));z-index:19;
  width:46px;height:46px;border-radius:50%;background:var(--panel);border:1px solid var(--line);
  color:var(--ink);font-size:19px;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.4)}
input[type=file]{display:none}
.filterow{display:flex;gap:8px;margin-bottom:14px}
.chip{background:var(--panel);border:1px solid var(--line);color:var(--dim);font-size:12px;font-weight:700;
  padding:7px 13px;border-radius:999px;cursor:pointer;white-space:nowrap}
.chip.on{background:var(--radar);color:#04121b;border-color:var(--radar)}
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="dot"></span>
    <h1>AI市場レーダー</h1>
    <span class="ver" id="ver">v2</span>
  </div>
  <div class="stamp" id="stamp">データ未読込</div>
</header>

<!-- 地合いバナー -->
<div class="regime yellow" id="regime" style="display:none">
  <div class="lbl">MARKET REGIME ／ 地合い</div>
  <div class="verdict" id="verdict">—</div>
  <div class="lights" id="lights"></div>
</div>

<!-- タブ -->
<div class="tabs" id="tabs" style="display:none">
  <button class="tab active" data-p="rank">TOP30</button>
  <button class="tab" data-p="radar">レーダー</button>
  <button class="tab" data-p="flow">資金・テーマ</button>
</div>

<div class="wrap">
  <!-- TOP30 -->
  <div class="pane active" id="pane-rank">
    <div class="filterow filterow-js" id="filters" style="display:none">
      <div class="chip on" data-f="all">全銘柄</div>
      <div class="chip" data-f="gap">未反応のみ</div>
      <div class="chip" data-f="rs">RS＞0のみ</div>
    </div>
    <div class="legend" id="legend" style="display:none">
      <span><i style="background:var(--radar)"></i>海外連動</span>
      <span><i style="background:#a98bff"></i>テーマ</span>
      <span><i style="background:var(--green)"></i>出来高</span>
      <span><i style="background:#ff9f4a"></i>ETF</span>
      <span><i style="background:var(--gold)"></i>技術</span>
      <span><i style="background:#4a9fff"></i>業績</span>
      <span><i style="background:#ff6fae"></i>材料</span>
    </div>
    <div id="rankList"></div>
  </div>
  <!-- レーダー -->
  <div class="pane" id="pane-radar">
    <div class="sec">米国ドライバー → 日本株への波及</div>
    <div id="radarList"></div>
  </div>
  <!-- 資金・テーマ -->
  <div class="pane" id="pane-flow">
    <div class="sec">ETF資金フロー（口数ベース・百万ドル）</div>
    <div id="flowList"></div>
    <div class="sec" style="margin-top:22px">テーマ強度（メンバー5日平均リターン）</div>
    <div id="themeList"></div>
  </div>

  <!-- 空状態 -->
  <div class="empty" id="empty">
    <div class="big">📡</div>
    <div>レーダーデータを読み込みます</div>
    <div class="hint" id="emptyHint">同じ場所の results.json を探しています…</div>
    <label class="upload-btn" for="file">ファイルを選ぶ</label>
    <div class="hint">Colabで出力した <b>results.json</b> を選んで表示することもできます</div>
  </div>
</div>

<button class="reload" id="reload" title="再読込" style="display:none">⟳</button>
<input type="file" id="file" accept="application/json,.json">

<nav id="nav" style="display:none">
  <button class="on" data-p="rank"><svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>ランキング</button>
  <button data-p="radar"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/><path d="M12 3v4M12 17v4M3 12h4M17 12h4"/></svg>レーダー</button>
  <button data-p="flow"><svg viewBox="0 0 24 24"><path d="M4 18V9M10 18V5M16 18v-7M20 18v-4"/></svg>資金</button>
</nav>

<script>
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
let DATA=null, filter="all";

function starClass(s){const n=(s.match(/★/g)||[]).length;return "s"+Math.min(5,Math.max(1,n));}
function fmtNum(n){return (n==null||isNaN(n))?"—":Number(n).toLocaleString();}
function sign(n){return (n>0?"+":"")+n.toFixed(1);}

async function tryFetch(){
  try{
    const r=await fetch("results.json",{cache:"no-store"});
    if(!r.ok) throw 0;
    const j=await r.json(); render(j); return true;
  }catch(e){ return false; }
}

function boot(){
  tryFetch().then(ok=>{
    if(!ok){
      $("#emptyHint").textContent="results.json が見つかりませんでした。ファイルを選ぶか、GitHubに置いてください。";
    }
  });
}

$("#file").addEventListener("change",e=>{
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ try{ render(JSON.parse(rd.result)); }catch(err){ alert("JSONの読み込みに失敗しました: "+err.message);} };
  rd.readAsText(f);
});
$("#reload").addEventListener("click",boot);

function render(j){
  DATA=j;
  $("#empty").style.display="none";
  ["#regime","#tabs","#nav","#reload","#filters","#legend"].forEach(s=>$(s).style.display="");
  $("#tabs").style.display="flex"; $("#nav").style.display="flex"; $("#filters").style.display="flex";
  $("#ver").textContent=j.version||"v2";
  const dt=(j.generated_at||"").replace("T"," ");
  $("#stamp").textContent="更新: "+dt;

  // 地合い
  const me=j.market_env||{};
  const rg=$("#regime"); rg.className="regime "+(me.regime||"yellow");
  $("#verdict").textContent=me.label||"データなし";
  $("#lights").innerHTML=(me.lights||[]).map(l=>`
    <div class="light ${l.color}"><span class="led"></span>
      <span class="n">${l.name}</span><span class="v">${l.value}</span></div>`).join("");

  renderRank(); renderRadar(); renderFlow();
}

function passFilter(s){
  if(filter==="gap") return (s.gap_pct||0)>0.5;
  if(filter==="rs")  return (s.rs20||0)>0;
  return true;
}

function renderRank(){
  const list=(DATA.stocks||[]).filter(passFilter).slice(0,30);
  $("#rankList").innerHTML=list.map((s,i)=>{
    const parts=[["b-link",s.linkage],["b-theme",s.theme],["b-sup",s.supply],
      ["b-etf",s.etf],["b-tech",s.tech],["b-fund",s.fund],["b-mat",s.material]];
    const tot=parts.reduce((a,[,v])=>a+(v||0),0)||1;
    const bar=parts.map(([c,v])=>`<i class="${c}" style="width:${(v||0)/tot*100}%"></i>`).join("");
    const gap=(s.gap_pct||0)>0.5?`<div class="gap">未反応ギャップ +${s.gap_pct.toFixed(1)}%</div>`:"";
    const rsCol=(s.rs20||0)>0?"var(--green)":"var(--dim)";
    return `<div class="card">
      <span class="rank">#${i+1}</span>
      <div class="crow"><span class="code">${s.code}</span><span class="nm">${s.name}</span>
        <div class="scoreBig"><div class="num" style="color:${scoreColor(s.score)}">${Math.round(s.score)}</div><div class="of">/100</div></div>
      </div>
      <div class="stars ${starClass(s.stars||"")}">${s.stars||""}</div>
      ${gap}
      <div class="metrics">
        <div class="metric"><span class="k">株価</span><span class="val mono">${fmtNum(s.close)}</span></div>
        <div class="metric"><span class="k">5日</span><span class="val mono" style="color:${(s.chg5d||0)>0?'var(--up)':'var(--down)'}">${sign(s.chg5d||0)}%</span></div>
        <div class="metric"><span class="k">RS20</span><span class="val mono" style="color:${rsCol}">${sign(s.rs20||0)}</span></div>
        <div class="metric"><span class="k">出来高</span><span class="val mono">${(s.v_ratio||0).toFixed(1)}x</span></div>
        <div class="metric"><span class="k">損切目安</span><span class="val mono">${fmtNum(s.stop)}</span></div>
      </div>
      <div class="bar">${bar}</div>
      <div class="reasons">${s.reasons_str||"—"}</div>
    </div>`;
  }).join("") || `<div class="empty" style="padding:40px 20px">条件に合う銘柄がありません</div>`;
}

function scoreColor(s){return s>=70?"var(--gold)":s>=60?"var(--green)":s>=50?"var(--cyan)":"var(--dim)";}

function renderRadar(){
  const rd=DATA.radar||[];
  $("#radarList").innerHTML = rd.length? rd.map(d=>{
    const up=(d.impulse_pct||0)>=0;
    const leaves=(d.stocks||[]).map(s=>{
      const gap=(s.gap_pct||0)>0.5?`<span class="lgap">未反応+${s.gap_pct.toFixed(1)}%</span>`:"";
      return `<div class="leaf">
        <span class="lnm">${s.name}<span class="lcode">${s.code}</span>
        <span class="lstars ${starClass(s.stars||"")}">${s.stars||""}</span></span>
        ${gap}<span class="lsc" style="color:${scoreColor(s.score)}">${Math.round(s.score)}</span></div>`;
    }).join("");
    return `<div class="driver">
      <div class="dh"><span class="flag">🇺🇸</span><span class="dname">${d.driver}</span>
        <span class="dimp ${up?'up':'dn'}">${sign(d.impulse_pct||0)}%</span></div>
      ${leaves}</div>`;
  }).join("") : `<div class="empty" style="padding:40px 20px">直近に大きく動いた米国ドライバーがありません</div>`;
}

function renderFlow(){
  const fl=DATA.etf_flows||{}, hedged=["DXJ","HEWJ","DBJP"];
  const rows=Object.entries(fl).sort((a,b)=>b[1]-a[1]);
  $("#flowList").innerHTML = rows.length? rows.map(([t,v])=>{
    const h=hedged.includes(t);
    return `<div class="flowrow"><span class="t">${t}</span>
      <span class="kindtag ${h?'h':'u'}">${h?'ヘッジ':'無ヘッジ'}</span>
      <span class="f ${v>=0?'pos':'neg'}">${v>=0?'+':''}${v.toFixed(1)}M$</span></div>`;
  }).join("") : `<div class="empty" style="padding:30px 20px;font-size:13px">ETFフローは2回目の実行から表示されます</div>`;

  const th=DATA.theme_strength||{};
  const te=Object.entries(th).sort((a,b)=>b[1]-a[1]);
  const mx=Math.max(1,...te.map(([,v])=>Math.abs(v)));
  $("#themeList").innerHTML=te.map(([n,v])=>{
    const col=v>=0?"var(--up)":"var(--down)";
    return `<div class="themerow"><span class="tn">${n}</span>
      <span class="themebar"><i style="width:${Math.abs(v)/mx*100}%;background:${col}"></i></span>
      <span class="ts" style="color:${col}">${sign(v)}%</span></div>`;
  }).join("");
}

// タブ切替
function switchPane(p){
  $$(".pane").forEach(x=>x.classList.remove("active"));
  $("#pane-"+p).classList.add("active");
  $$(".tab").forEach(x=>x.classList.toggle("active",x.dataset.p===p));
  $$("nav button").forEach(x=>x.classList.toggle("on",x.dataset.p===p));
  window.scrollTo(0,0);
}
$$(".tab").forEach(b=>b.onclick=()=>switchPane(b.dataset.p));
$$("nav button").forEach(b=>b.onclick=()=>switchPane(b.dataset.p));
$$(".chip").forEach(c=>c.onclick=()=>{
  $$(".chip").forEach(x=>x.classList.remove("on")); c.classList.add("on");
  filter=c.dataset.f; renderRank();
});

boot();
</script>
</body>
</html>
